# Workflow: LLM extracts a reasoning plan (target, values, formula), then
# Python evaluates the formula deterministically.  Falls back to LLM
# extraction when no clean formula is found.
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache

evaluate:
  result_dir: results
  expt_name: DEFAULT

dataset:
  split: valid
  shuffle_seed: null
  n: null

ptools:
  parse_table:
    method: direct
  compute:
    method: direct
  extract_reasoning_plan:
    method: simulate
  extract_final_number:
    method: simulate
  answer_finqa:
    method: direct
    fn: ptools.answer_finqa_workflow
